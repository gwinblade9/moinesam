{% extends "base.html" %}

{% block content %}
<div class="hero" style="padding: 20px 0;">
    <h2><span>Вход в систему</span></h2>
    <p>Войдите в свой аккаунт</p>
</div>

<form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
        <label><i class="fas fa-key"></i> Логин</label>
        <input type="text" name="login" placeholder="Введите логин" required>
    </div>
    
    <div class="form-group">
        <label><i class="fas fa-lock"></i> Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль" required>
    </div>
    
    <button type="submit"><i class="fas fa-sign-in-alt"></i> Войти</button>
</form>

<div style="text-align: center; margin-top: 20px;">
    <p style="font-size: 12px; color: #a0a8c0;">Нет аккаунта? <a href="{{ url_for('register') }}" style="color: #ffd700;">Зарегистрироваться</a></p>
    <p style="font-size: 11px; color: #a0a8c0; margin-top: 15px;">🔐 Администратор: adminka / password</p>
</div>
{% endblock %}
