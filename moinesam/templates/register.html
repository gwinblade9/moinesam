{% extends "base.html" %}

{% block content %}
<div class="hero" style="padding: 20px 0;">
    <h2><span>Регистрация</span></h2>
    <p>Создайте аккаунт для заказа услуг</p>
</div>

<form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
        <label><i class="fas fa-user"></i> ФИО</label>
        <input type="text" name="fullname" placeholder="Иванов Иван Иванович" required>
    </div>
    
    <div class="form-group">
        <label><i class="fas fa-phone"></i> Телефон</label>
        <input type="tel" name="phone" placeholder="+7 (999) 123-45-67" required>
    </div>
    
    <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" name="email" placeholder="ivan@example.com" required>
    </div>
    
    <div class="form-group">
        <label><i class="fas fa-key"></i> Логин</label>
        <input type="text" name="login" placeholder="Придумайте логин" required>
    </div>
    
    <div class="form-group">
        <label><i class="fas fa-lock"></i> Пароль</label>
        <input type="password" name="password" placeholder="Придумайте пароль" required>
    </div>
    
    <button type="submit"><i class="fas fa-user-plus"></i> Зарегистрироваться</button>
</form>

<div style="text-align: center; margin-top: 20px;">
    <p style="font-size: 12px; color: #a0a8c0;">Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: #ffd700;">Войти</a></p>
</div>
{% endblock %}
